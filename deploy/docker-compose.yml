version: '3.8'

services:
  accounting-app:
    build:
      context: ../node-app
      dockerfile: ../deploy/Dockerfile
    container_name: accounting-app
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - NODE_ENV=production
      - INITIAL_BALANCE=1000.00
    healthcheck:
      test: ["CMD", "node", "-e", "const DataStore = require('./src/data'); const d = new DataStore(); process.exit(d.read() >= 0 ? 0 : 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
